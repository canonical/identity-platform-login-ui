name: CVEs checker

on:
  issues:
    types: [opened]
  schedule:
     - cron: '0 0 * * 0'

jobs:
    list-all-issues:
        outputs:
            issues: ${{ steps.issues.outputs.ids }}
        runs-on: ubuntu-latest
        if: ${{ github.event_name == 'schedule' }}
        steps:
          - run: echo ids=$(gh issue list --json number,author -q '.[] | select(.author.login == "ROCKsBot") | .number') >> $GITHUB_OUTPUT
            id: list
            env:
                GH_PAGER:
                GH_TOKEN: ${{ github.token }}
                GH_REPO: ${{ github.repository }}
          - run: echo ids=$(echo ${{steps.list.outputs.ids}} | jq -R 'split(" ")') >> $GITHUB_OUTPUT
            id: issues

    scheduled-check:
        if: ${{ github.event_name == 'schedule' }}
        permissions:
            contents: write
            issues: write
        strategy:
            matrix:
                issue: ${{ fromJson(needs.list-all-issues.outputs.issues) }}
        needs:
            - list-all-issues
        uses: canonical/identity-team/.github/workflows/cve-check.yaml@d64b860c8679d3539f5f35f3d2494c419d8e41b5 # v1.12.2
        with:
            issue: ${{ matrix.issue }}

    apply-labels:
        permissions:
            contents: write
            issues: write
        uses: canonical/identity-team/.github/workflows/cve-check.yaml@d64b860c8679d3539f5f35f3d2494c419d8e41b5 # v1.12.2
        if: ${{ github.event.issue.id }}
